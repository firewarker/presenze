<body>

<script>
/* ======================= CONFIG ======================= */
// Configurazione del progetto Firebase "presenze-7ba78" (gia' inserita). La apiKey Web non e' segreta.
// La sicurezza reale e' data dalle regole del database + dai domini autorizzati in Authentication.

  apiKey: "AIzaSyAZ94trW8zfyjjH7vx03F09_u8bvqhtmS4",
  authDomain: "presenze-7ba78.firebaseapp.com",
  databaseURL: "https://presenze-7ba78-default-rtdb.europe-west1.firebasedatabase.app",

  messagingSenderId: "782370422526",
  appId: "1:782370422526:web:f7b6180cb77fe7031cafaf"
};
const ADMIN_EMAIL  = "admin@vvflentini.it";   // account amministratore (vede tutti i turni)

const SEDE = "Lentini (2002)";

/* ======================= COSTANTI ======================= */
const QUALIFICHE=['CR','CSE','CS','VPC','VPE','VP','VV'];
const RANK={CR:0,CSE:1,CS:2,VPC:3,VPE:4,VP:5,VV:6};
const DEFAULT_CODICI={
  L:['Licenza','#E3ECF7','#1F5C99'], M:['Malattia','#F7E3E6','#C8102E'], MB:['Malattia bambino','#FBEBD8','#9A5B00'],
  SD:['Sost. diurna','#FAF1D6','#876200'], SN:['Sost. notturna','#ECE7F6','#5B3FA0'], DS:['Donazione sangue','#DEF1EC','#137A63'],
  MI:['Missione','#E4E9F7','#33408F'], RO:['Recupero ore','#EDEFEA','#6B7280'], PF:['Permesso famiglia','#FBE6F0','#9D2B6B'],
  CP:['Congedo parentale','#ECF5DA','#4C6B1C'], P:['Presente','#E3F1E4','#1E6B39']
};
const WDS=['dom','lun','mar','mer','gio','ven','sab'];
const WDL=['domenica','luned\u00ec','marted\u00ec','mercoled\u00ec','gioved\u00ec','venerd\u00ec','sabato'];
const MESI=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
const ABSENCE=['L','M','MB','MI','DS','PF','CP','RO'];
const ICONS={
 grid:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>',
 check:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>',

 ticket:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 8a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v2a2 2 0 0 0 0 4v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-2a2 2 0 0 0 0-4z"/><line x1="13" y1="6" x2="13" y2="18" stroke-dasharray="2 2"/></svg>',
 sliders:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/><circle cx="9" cy="8" r="2.3" fill="currentColor" stroke="none"/><circle cx="15" cy="16" r="2.3" fill="currentColor" stroke="none"/></svg>',

};

/* ======================= MOTORE TURNI ======================= */
// Validato sul turnario reale (foglio Calendario). ref = 1 gennaio 2026.
function dayN(y,m,d){ return Math.round((Date.UTC(y,m-1,d)-Date.UTC(2026,0,1))/86400000); }
function diurnoTurno(n){ return ['B','C','D','A'][((n%4)+4)%4]; }
function diuSalto(n){ return ((Math.floor((n+1)/4)+5)%8+8)%8+1; }
function notSalto(n){ return ((Math.floor(n/4)+5)%8+8)%8+1; }
// per il turno T in un giorno -> {tipo:'G'|'N'|null, salto:1..8}
function dutyFor(T,y,m,d){
  const n=dayN(y,m,d);
  if(diurnoTurno(n)===T) return {tipo:'G',salto:diuSalto(n)};
  if(diurnoTurno(n-1)===T) return {tipo:'N',salto:notSalto(n)};
  return {tipo:null,salto:0};
}
function workingDays(T,y,m){
  const out=[],last=new Date(y,m,0).getDate();
  for(let d=1; d<=last; d++){ const du=dutyFor(T,y,m,d); if(du.tipo){ out.push({day:d, wd:new Date(y,m-1,d).getDay(), tipo:du.tipo, salto:du.salto}); } }
  return out;
}
// Il turno PROVA (sandbox solo-admin) usa il turnario reale del turno D ma scrive su dati isolati (/turni/PROVA).
function engTurno(){ return S.turno==='PROVA' ? 'D' : S.turno; }

/* ======================= STATO ======================= */
let auth, db, scopeRefs=[];
const S={ turno:null, isAdmin:false, email:'', year:2026, month:1, tab:0,
          personale:{}, codici:{}, cells:{}, note:{}, esterni:{}, mezzi:{}, saltoOv:{} };

function codeColor(c){ const cc=S.codici[c]||DEFAULT_CODICI[c]; return cc?[cc[1],cc[2]]:['#EDEFEA','#6B7280']; }
function codeLabel(c){ const cc=S.codici[c]||DEFAULT_CODICI[c]; return cc?cc[0]:c; }
function allCodici(){ const o=Object.assign({},DEFAULT_CODICI,S.codici); delete o.P; return o; }
function personArr(){ return Object.keys(S.personale).map(id=>Object.assign({id},S.personale[id])).sort((a,b)=>(RANK[a.q]-RANK[b.q])||((a.pos||99)-(b.pos||99))||(''+a.cognome).localeCompare(b.cognome)); }
function effPos(p){ const ov=S.saltoOv[p.id]; return (ov!=null&&ov!=='')?+ov:(p.pos||0); }
function cellCode(pid,day){ return (S.cells[pid]&&S.cells[pid][day])||''; }

/* ======================= FIREBASE ======================= */
function startApp(){
  if(String(firebaseConfig.apiKey).indexOf('INCOLLA')===0){
    document.getElementById('cfgWarn').classList.remove('hide');
    document.getElementById('cfgWarn').innerHTML='Manca la <b>apiKey</b> di Firebase. Apri index.html, cerca <b>INCOLLA_QUI_LA_API_KEY</b> e incolla la chiave dalla Console Firebase (Impostazioni progetto &rarr; Le tue app &rarr; SDK setup).';
    return;
  }
  firebase.initializeApp(firebaseConfig);
  auth=firebase.auth(); db=firebase.database();
  auth.onAuthStateChanged(onAuth);
}
function onAuth(user){
  if(!user){ document.getElementById('app').classList.add('hide'); document.getElementById('login').classList.remove('hide'); detach(); return; }
  S.email=(user.email||'').toLowerCase();
  S.isAdmin=(S.email===ADMIN_EMAIL.toLowerCase());
  if(S.isAdmin){ S.turno=S.turno||'A'; }
  else { const m=S.email.match(/^turno([abcd])@/); S.turno=m?m[1].toUpperCase():null; }
  document.getElementById('login').classList.add('hide');
  document.getElementById('app').classList.remove('hide');
  if(!S.turno){ document.getElementById('content').innerHTML='<div class="note">Questo utente non e\' associato a nessun turno. Usa un indirizzo del tipo <b>turnod@'+EMAIL_DOMAIN+'</b> oppure l\'account amministratore.</div>'; return; }
  attach();
}
function doLogin(){
  const e=document.getElementById('liEmail').value.trim(), p=document.getElementById('liPass').value;
  document.getElementById('liErr').textContent='';
  if(!auth){ document.getElementById('liErr').textContent='Configurazione Firebase mancante.'; return; }
  auth.signInWithEmailAndPassword(e,p).catch(err=>{ document.getElementById('liErr').textContent='Accesso non riuscito: '+(err.code||err.message); });
}
function doLogout(){ if(auth) auth.signOut(); }
function changePasswordModal(){
  if(!auth||!auth.currentUser) return;
  openModal('<h3>Cambia password</h3><div class="ms">'+auth.currentUser.email+'</div>'
    +'<label class="eyebrow">Password attuale</label><input id="cpOld" type="password" autocomplete="current-password">'
    +'<label class="eyebrow" style="margin-top:0.5rem">Nuova password</label><input id="cpNew" type="password" autocomplete="new-password">'
    +'<label class="eyebrow" style="margin-top:0.5rem">Conferma nuova password</label><input id="cpNew2" type="password" autocomplete="new-password">'
    +'<div id="cpErr" class="login-err" style="text-align:left;color:#C8102E"></div>'
    +'<button class="btn btn-fire btn-full" style="margin-top:0.6rem" onclick="doChangePassword()">Aggiorna password</button>');
}
function doChangePassword(){
  const o=val('cpOld'), n=val('cpNew'), n2=val('cpNew2'), err=document.getElementById('cpErr'); err.textContent='';
  if(n.length<6){ err.textContent='La nuova password deve avere almeno 6 caratteri.'; return; }
  if(n!==n2){ err.textContent='Le due password non coincidono.'; return; }
  const u=auth.currentUser, cred=firebase.auth.EmailAuthProvider.credential(u.email,o);
  u.reauthenticateWithCredential(cred).then(function(){ return u.updatePassword(n); })
   .then(function(){ closeModal(); alert('Password aggiornata con successo.'); })
   .catch(function(e){ err.textContent = (e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')?'Password attuale errata.':('Errore: '+(e.code||e.message)); });
}

function detach(){ scopeRefs.forEach(r=>r.off()); scopeRefs=[]; }
function attach(){
  detach();
  const base='turni/'+S.turno;
  const yk=S.year, mk=S.month, mbase=base+'/anno/'+yk+'/mesi/'+mk;
  setSync(true);
  const bind=(path,key,cb)=>{ const r=db.ref(path); r.on('value',s=>{ S[key]=s.val()||{}; (cb||render)(); }, ()=>setSync(false)); scopeRefs.push(r); };
  bind(base+'/personale','personale');
  bind(base+'/codici','codici');
  bind(base+'/mezzi','mezzi');
  bind(mbase+'/celle','cells');
  bind(mbase+'/note','note');
  bind(mbase+'/esterni','esterni');
  bind(mbase+'/saltoOv','saltoOv');
  document.getElementById('hSub').textContent='Turno '+S.turno+(S.isAdmin?' (admin)':'')+' \u00b7 '+MESI[S.month-1]+' '+S.year;
  render();
}
function setSync(ok){ document.getElementById('syncDot').classList.toggle('off',!ok); document.getElementById('syncTxt').textContent=ok?'Firebase':'Offline'; }
function refMese(){ return 'turni/'+S.turno+'/anno/'+S.year+'/mesi/'+S.month; }
function changePeriod(){ attach(); }

/* ======================= AZIONI DB ======================= */
function setCell(pid,day,code){ const r=db.ref(refMese()+'/celle/'+pid+'/'+day); code?r.set(code):r.remove(); closeModal(); }
function setNote(pid,day,val){ const r=db.ref(refMese()+'/note/'+day+'/'+pid); val?r.set(val):r.remove(); }
function savePerson(id){
  const o={q:val('edQual'),cognome:val('edCognome'),nome:val('edNome'),pos:+val('edPos')||0,fSpett:+val('edF0')||0,fRes:+val('edF1')||0,cong:+val('edCong')||0};
  const ref=db.ref('turni/'+S.turno+'/personale'); (id?ref.child(id):ref.push()).update(o); closeModal();
}
function delPerson(id){ if(confirm('Eliminare questa persona?')){ db.ref('turni/'+S.turno+'/personale/'+id).remove(); closeModal(); } }
function saveCode(){ const c=val('cdCode').toUpperCase().trim(); if(!c) return; db.ref('turni/'+S.turno+'/codici/'+c).set([val('cdLabel')||c, val('cdBg')||'#EDEFEA', val('cdTx')||'#10151E']); closeModal(); }
function delCode(c){ db.ref('turni/'+S.turno+'/codici/'+c).remove(); closeModal(); }
function saveMezzo(id){ const o={nome:val('mzNome')}; const ref=db.ref('turni/'+S.turno+'/mezzi'); (id?ref.child(id):ref.push()).update(o); closeModal(); }
function delMezzo(id){ db.ref('turni/'+S.turno+'/mezzi/'+id).remove(); closeModal(); }
function toggleMezzoOp(day,id,op){ db.ref(refMese()+'/mezziOp/'+day+'/'+id).set({op:op}); }
function saveExternal(day){ const o={q:val('exQual'),cognome:val('exCognome'),nome:val('exNome'),prov:val('exProv'),motivo:val('exMot')}; db.ref(refMese()+'/esterni/'+day).push(o); closeModal(); }
function delExternal(day,eid){ db.ref(refMese()+'/esterni/'+day+'/'+eid).remove(); }
function applySalto(pid,scope){
  if(scope==='mese'){ const np=prompt('Nuova posizione di salto per questo mese (1-8, vuoto = nessuno):',''); db.ref(refMese()+'/saltoOv/'+pid).set(np?+np:null); }
  else { const np=prompt('Nuova posizione di salto permanente (1-8):',S.personale[pid].pos||''); if(np!==null){ db.ref('turni/'+S.turno+'/personale/'+pid+'/pos').set(+np||0); } }
  closeModal();
}
function val(id){ const e=document.getElementById(id); return e?e.value:''; }

/* ======================= RENDER ======================= */
const TABS=[['grid','Prospetto',scProspetto],['check','Presenze',scPresenze],['sun','Ferie',scFerie],['ticket','Buoni',scBuoni],['sliders','Setup',scSetup]];
function render(){
  document.getElementById('nav').innerHTML=TABS.map((t,i)=>'<button class="'+(i===S.tab?'active':'')+'" onclick="go('+i+')">'+ICONS[t[0]]+'<span class="nl">'+t[1]+'</span></button>').join('');
  document.getElementById('content').innerHTML=TABS[S.tab][2]();
}
function go(i){ S.tab=i; render(); }

function periodControls(extra){
  let years=''; for(let y=2024;y<=2030;y++) years+='<option value="'+y+'"'+(y===S.year?' selected':'')+'>'+y+'</option>';
  let months=MESI.map((mm,i)=>'<option value="'+(i+1)+'"'+((i+1)===S.month?' selected':'')+'>'+mm.charAt(0).toUpperCase()+mm.slice(1)+'</option>').join('');
  let turnoSel='';
  if(S.isAdmin){ turnoSel='<div class="field"><label class="eyebrow">Turno</label><select onchange="S.turno=this.value;changePeriod()">'+['A','B','C','D','PROVA'].map(t=>'<option value="'+t+'"'+(t===S.turno?' selected':'')+'>'+(t==='PROVA'?'PROVA (test)':t)+'</option>').join('')+'</select></div>'; }
  else { turnoSel='<div class="field"><label class="eyebrow">Turno</label><input value="'+S.turno+'" disabled></div>'; }
  return '<div class="ctl-row">'+turnoSel
    +'<div class="field"><label class="eyebrow">Mese</label><select onchange="S.month=+this.value;changePeriod()">'+months+'</select></div>'
    +'<div class="field"><label class="eyebrow">Anno</label><select onchange="S.year=+this.value;changePeriod()">'+years+'</select></div>'+(extra||'')+'</div>';
}

function scProspetto(){
  const wd=workingDays(engTurno(),S.year,S.month), people=personArr();
  if(!people.length) return periodControls()+'<div class="note">Nessuna persona nel turno. Vai in <b>Setup</b> e aggiungi il personale: l\'ordine seguir\u00e0 la qualifica e le posizioni di salto.</div>';
  let head='<tr><th class="name"><span class="eyebrow">Personale</span></th>';
  wd.forEach(c=>{ head+='<th><div class="daynum">'+c.day+'</div><div class="dayw">'+WDS[c.wd]+'</div><span class="gn '+(c.tipo==='G'?'gn-g':'gn-n')+'">'+c.tipo+'</span></th>'; });
  head+='</tr>';
  let body='';
  people.forEach(p=>{
    let row='<tr><td class="name"><span class="pq">'+p.q+'</span><div class="pname">'+(p.cognome||'')+' '+(p.nome||'').charAt(0)+(p.nome?'.':'')+'</div></td>';
    wd.forEach(c=>{
      const isR=(effPos(p)===c.salto);
      let inner;
      if(isR) inner='<button class="cell" onclick="cellModal(\''+p.id+'\','+c.day+',true)"><span class="rcell">R</span></button>';
      else { const code=cellCode(p.id,c.day);
        if(!code) inner='<button class="cell empty" onclick="cellModal(\''+p.id+'\','+c.day+',false)">\u00b7</button>';
        else { const col=codeColor(code); inner='<button class="cell" onclick="cellModal(\''+p.id+'\','+c.day+',false)"><span class="chipc" style="background:'+col[0]+';color:'+col[1]+'">'+code+'</span></button>'; }
      }
      row+='<td class="daycell">'+inner+'</td>';
    });
    body+=row+'</tr>';
  });
  let extBody='';
  esterniRows().forEach(x=>{
    let r='<tr><td class="name" style="background:#FFFBF2"><span class="pq" style="background:#E0A314">EXT</span><div class="pname">'+(x.cognome||'')+' '+(x.nome||'').charAt(0)+(x.nome?'.':'')+'</div><div class="rs" style="font-size:0.56rem;color:#9AA0A8">'+(x.prov||'esterno')+'</div></td>';
    wd.forEach(c=>{ const mot=x.days[c.day]; let inner='<span class="empty">\u00b7</span>';
      if(mot){ const col=(mot==='Straordinario')?['#FAF1D6','#876200']:['#EDEFEA','#737A70']; inner='<span class="chipc" style="background:'+col[0]+';color:'+col[1]+'">'+(mot==='Straordinario'?'ST':'SO')+'</span>'; }
      r+='<td class="daycell">'+inner+'</td>';
    });
    extBody+=r+'</tr>';
  });
  return periodControls()
    +'<div class="grid-wrap"><table class="grid"><thead>'+head+'</thead><tbody>'+body+extBody+'</tbody></table></div>'
    +'<div class="cap">Vuoto = da compilare \u00b7 R = salto (auto) \u00b7 EXT = personale esterno (ST straordinario, SO sostituzione) \u2014 si gestiscono in Presenze</div>'
    +legendHtml()
    +'<button class="btn btn-fire btn-full mt" onclick="askSigner(\'ferie\')">'+ICONS.sun+' Esporta prospetto / richiesta ferie (PDF)</button>';
}
function legendHtml(){ const c=allCodici(); let s='<div class="legend">'; ['L','M','MB','SD','SN'].forEach(k=>{ if(c[k]) s+='<span><b style="background:'+c[k][1]+'"></b>'+k+' '+c[k][0].toLowerCase()+'</span>'; }); s+='<span><b style="background:#EDEFEA;border:1px dashed #C2C6BD"></b>R recupero (auto)</span></div>'; return s; }

function cellModal(pid,day,isR){
  const p=S.personale[pid], du=dutyFor(engTurno(),S.year,S.month,day), cur=cellCode(pid,day);
  const c=allCodici();
  let grid='<button class="codebtn" onclick="setCell(\''+pid+'\','+day+',\'\')"><span class="cc">\u2014</span>Vuota</button>';
  grid+='<button class="codebtn" onclick="setCell(\''+pid+'\','+day+',\'P\')"><span class="cc">P</span>Presente</button>';
  Object.keys(c).forEach(k=>{ const b=(k===cur)?'border-color:#C8102E;background:#FCEBEE;':''; grid+='<button class="codebtn" style="'+b+'" onclick="setCell(\''+pid+'\','+day+',\''+k+'\')"><span class="cc">'+k+'</span>'+c[k][0]+'</button>'; });
  let salto='<div class="salto-row"><span class="eyebrow">Salto turno</span>'
    +'<button class="btn btn-out btn-xs" onclick="applySalto(\''+pid+'\',\'mese\')">Solo questo mese</button>'
    +'<button class="btn btn-out btn-xs" onclick="applySalto(\''+pid+'\',\'sempre\')">In generale</button></div>';
  openModal('<h3>'+(isR?'Salto turno':'Imposta codice')+'</h3><div class="ms">'+(p.cognome||'')+' '+(p.nome||'')+' \u00b7 '+day+' '+MESI[S.month-1]+' \u00b7 '+(du.tipo==='G'?'diurno 08-20':'notturno 20-08')+'</div>'
    +(isR?'<div class="note" style="margin:0 0 0.8rem">Questa giornata \u00e8 un salto turno calcolato automaticamente. Per modificarlo usa i pulsanti qui sotto.</div>':'<div class="codegrid">'+grid+'</div>')
    +salto);
}

function dayRoster(day){ // per la scheda presenze
  const du=dutyFor(engTurno(),S.year,S.month,day);
  return personArr().map(p=>{ const isR=(effPos(p)===du.salto); const code=isR?'R':cellCode(p.id,day); return {p,isR,code,du}; });
}
function scPresenze(){
  const wd=workingDays(engTurno(),S.year,S.month);
  if(!wd.length) return periodControls()+'<div class="note">Nessuna giornata di servizio per questo turno nel mese selezionato.</div>';
  if(!S.curDay || !wd.find(w=>w.day===S.curDay)) S.curDay=wd[0].day;
  const du=dutyFor(engTurno(),S.year,S.month,S.curDay);
  const dd=new Date(S.year,S.month-1,S.curDay);
  let dayOpts=wd.map(w=>'<option value="'+w.day+'"'+(w.day===S.curDay?' selected':'')+'>'+w.day+' '+MESI[S.month-1]+' ('+w.tipo+')</option>').join('');
  const ros=dayRoster(S.curDay);
  let pres=0,ass=0,rec=0;
  let list=ros.map(r=>{
    const note=(S.note[S.curDay]&&S.note[S.curDay][r.p.id])||'';
    let cls,tag;
    if(r.isR){ rec++; cls='rec'; tag='<span class="tag" style="background:#EDEFEA;color:#737A70">Recupero</span>'; }
    else if(r.code && ABSENCE.indexOf(r.code)>=0){ ass++; const col=codeColor(r.code); cls='ko'; tag='<span class="tag" style="background:'+col[0]+';color:'+col[1]+'">Assente \u00b7 '+r.code+'</span>'; }
    else { pres++; cls='ok'; tag='<span class="tag" style="background:#E3F1E4;color:#1E6B39">Presente</span>'; }
    return '<div class="row '+cls+'"><div><div class="rn">'+r.p.q+' \u00b7 '+(r.p.cognome||'')+' '+(r.p.nome||'')+'</div>'
      +'<input style="border:none;background:none;font-size:0.72rem;color:#5B636E;width:100%;margin-top:0.1rem" placeholder="note (es. autista, capo partenza)" value="'+note.replace(/"/g,'&quot;')+'" onchange="setNote(\''+r.p.id+'\','+S.curDay+',this.value)"></div>'+tag+'</div>';
  }).join('');
  // esterni
  const ext=(S.esterni[S.curDay])||{};
  let extHtml=Object.keys(ext).map(eid=>{ const e=ext[eid]; const b=e.motivo==='Straordinario'?['#FAF1D6','#876200','1 buono']:['#EDEFEA','#737A70','0 buoni']; return '<div class="row ext"><div><div class="rn">'+e.q+' \u00b7 '+e.cognome+' '+e.nome+'</div><div class="rs">'+(e.prov||'')+' \u00b7 '+e.motivo+'</div></div><div style="display:flex;gap:0.4rem;align-items:center"><span class="tag" style="background:'+b[0]+';color:'+b[1]+'">'+e.motivo+' \u00b7 '+b[2]+'</span><button class="icon-btn" onclick="delExternal('+S.curDay+',\''+eid+'\')">'+ICONS.trash+'</button></div></div>'; }).join('');
  // mezzi
  const mezzi=S.mezzi||{}, mop=(S.mezziOp&&S.mezziOp[S.curDay])||{};
  let mezHtml=Object.keys(mezzi).map(id=>{ const op=!(mop[id]&&mop[id].op===false); return '<div class="veh"><span>'+(mezzi[id].nome||'')+'</span><button class="btn btn-xs '+(op?'btn-out':'btn-out')+'" style="'+(op?'color:#1E6B39;border-color:#9FCBAA':'color:#C8102E;border-color:#E3A6AE')+'" onclick="toggleMezzoOp('+S.curDay+',\''+id+'\','+(!op)+')">'+(op?'Operativo':'Non operativo')+'</button></div>'; }).join('');
  if(!Object.keys(mezzi).length) mezHtml='<div class="rs">Nessun mezzo configurato (aggiungili in Setup).</div>';
  return periodControls('<div class="field" style="flex:1.4"><label class="eyebrow">Giornata</label><select onchange="S.curDay=+this.value;render()">'+dayOpts+'</select></div>')
    +'<div class="ms" style="font-size:0.78rem;color:#5B636E;margin:-0.5rem 0 0.8rem">'+WDL[dd.getDay()]+' '+S.curDay+' '+MESI[S.month-1]+' '+S.year+' \u00b7 servizio '+(du.tipo==='G'?'diurno 08:00-20:00':'notturno 20:00-08:00')+'</div>'
    +'<div class="stats3"><div class="stat"><div class="v" style="color:#2C8B4B">'+pres+'</div><div class="l">Presenti</div></div><div class="stat"><div class="v" style="color:#C8102E">'+ass+'</div><div class="l">Assenti</div></div><div class="stat"><div class="v" style="color:#737A70">'+rec+'</div><div class="l">Recupero</div></div></div>'
    +list
    +'<div class="sec-h"><span class="eyebrow">Personale esterno presso Lentini</span></div>'+(extHtml||'')+'<button class="btn btn-out btn-full" onclick="externalModal('+S.curDay+')" style="margin-top:0.3rem">+ Aggiungi personale esterno</button>'
    +'<div class="sec-h"><span class="eyebrow">Mezzi operativi</span></div>'+mezHtml
    +'<button class="btn btn-fire btn-full mt" onclick="askSigner(\'pres\','+S.curDay+')">'+ICONS.check+' Genera PDF presenze del giorno</button>';
}
function externalModal(day){
  let qo=QUALIFICHE.map(q=>'<option>'+q+'</option>').join('');
  openModal('<h3>Personale esterno</h3><div class="ms">'+day+' '+MESI[S.month-1]+'</div>'
    +'<label class="eyebrow">Qualifica</label><select id="exQual">'+qo+'</select>'
    +'<label class="eyebrow" style="margin-top:0.5rem">Cognome</label><input id="exCognome">'
    +'<label class="eyebrow" style="margin-top:0.5rem">Nome</label><input id="exNome">'
    +'<label class="eyebrow" style="margin-top:0.5rem">Provenienza</label><input id="exProv" placeholder="es. Turno A">'
    +'<label class="eyebrow" style="margin-top:0.5rem">Motivo</label><select id="exMot"><option>Straordinario</option><option>Sostituzione</option></select>'
    +'<button class="btn btn-fire btn-full" style="margin-top:0.9rem" onclick="saveExternal('+day+')">Aggiungi</button>');
}

function scFerie(){
  const wd=workingDays(engTurno(),S.year,S.month);
  return periodControls()
    +'<div class="note" style="margin-top:0">Il prospetto da inviare al Capo Turno (entro il 20 per il mese successivo) mostra le giornate di servizio, i <b>salti (R)</b> e le <b>ferie (L)</b>. Malattie e sostituzioni si registrano durante il mese e non compaiono qui.</div>'
    +'<div class="sec-h"><span class="eyebrow">Saldi ferie del turno</span></div>'
    +personArr().map(p=>{ const res=(p.fSpett||0)+(p.fRes||0)-ferieGodute(p.id); return '<div class="row"><div><div class="rn">'+p.q+' \u00b7 '+(p.cognome||'')+' '+(p.nome||'')+'</div><div class="rs">Spettanti '+S.year+': '+(p.fSpett||0)+' \u00b7 Residue '+(S.year-1)+': '+(p.fRes||0)+' \u00b7 Godute (anno): n.d.'+(p.cong?' \u00b7 Congedo: '+p.cong+' gg':'')+'</div></div><div style="text-align:right"><div class="cond" style="font-weight:700;font-size:1.3rem;color:#1F5C99;line-height:1">'+res+'</div><div class="rs">residue (mese)</div></div></div>'; }).join('')
    +'<button class="btn btn-fire btn-full mt" onclick="askSigner(\'ferie\')">'+ICONS.sun+' Genera PDF prospetto / richiesta ferie</button>';
}
function ferieGodute(pid){ let n=0; const c=S.cells[pid]||{}; Object.keys(c).forEach(d=>{ if(c[d]==='L') n++; }); return n; }

function rk(q){ return (RANK[q]!==undefined)?RANK[q]:99; }
function esterniRows(){ // raggruppa gli esterni del mese per persona: {q,cognome,nome,prov,days:{day:motivo}}
  const map={};
  Object.keys(S.esterni||{}).forEach(day=>{ const e=S.esterni[day]||{}; Object.keys(e).forEach(eid=>{ const x=e[eid]||{};
    const k=(x.q||'')+'|'+((x.cognome||'').trim().toLowerCase())+'|'+((x.nome||'').trim().toLowerCase());
    if(!map[k]) map[k]={q:x.q||'',cognome:x.cognome||'',nome:x.nome||'',prov:x.prov||'',days:{}};
    map[k].days[+day]=x.motivo||'Straordinario'; if(!map[k].prov && x.prov) map[k].prov=x.prov;
  }); });
  return Object.keys(map).sort((a,b)=>rk(map[a].q)-rk(map[b].q)).map(k=>map[k]);
}
function esternoBuoni(days){ let t=0; Object.keys(days).forEach(d=>{ if(days[d]==='Straordinario') t++; }); return t; }
function buoniPerson(p){ // presenze (vuoto/P) escluse R e assenze + 2*SD + SN
  const wd=workingDays(engTurno(),S.year,S.month); let pres=0,sd=0,sn=0;
  wd.forEach(c=>{ if(effPos(p)===c.salto) return; const code=cellCode(p.id,c.day); if(code==='SD'){sd++;} else if(code==='SN'){sn++;} else if(ABSENCE.indexOf(code)>=0){} else {pres++;} });
  return {pres,sd,sn,tot:pres+2*sd+sn};
}
function scBuoni(){
  const people=personArr(); let tot=0;
  let rows=people.map(p=>{ const b=buoniPerson(p); tot+=b.tot; let bd=[b.pres+' presenze']; if(b.sd)bd.push(b.sd+' SD'); if(b.sn)bd.push(b.sn+' SN'); return '<div class="row"><div><div class="rn">'+p.q+' \u00b7 '+(p.cognome||'')+' '+(p.nome||'')+'</div><div class="rs">'+bd.join(' \u00b7 ')+'</div></div><div style="text-align:right"><div class="cond" style="font-weight:700;font-size:1.4rem;color:#C8102E;line-height:1">'+b.tot+'</div><div class="rs">buoni</div></div></div>'; }).join('');
  // esterni del mese, raggruppati per persona
  let extTot=0, extRows='';
  esterniRows().forEach(x=>{ const b=esternoBuoni(x.days); extTot+=b; const dl=Object.keys(x.days).sort((a,b)=>a-b).map(d=>d+(x.days[d]==='Straordinario'?'\u00b7str':'\u00b7sos')).join(', ');

  tot+=extTot;
  return periodControls()

    didParseCell:function(d){
      if(d.section==='body' && d.column.index===0 && d.row.index>=nPers){ d.cell.styles.fillColor=[255,251,242]; d.cell.styles.textColor=[120,98,0]; }

        if(v==='R'||v==='SO'){d.cell.styles.fillColor=[237,239,234];d.cell.styles.textColor=[115,122,112];}
        else if(v==='SD'||v==='ST'){d.cell.styles.fillColor=[250,241,214];d.cell.styles.textColor=[135,98,0];}
        else if(v==='SN'){d.cell.styles.fillColor=[236,231,246];d.cell.styles.textColor=[91,63,160];}

        d.cell.styles.fontStyle='bold'; } } });
  let y=doc.lastAutoTable.finalY+6;
  const grand=totTurno;
  doc.setFillColor(252,235,238); doc.rect(14,y,W-28,9,'F'); doc.setDrawColor(154,160,168); doc.setLineWidth(0.3); doc.rect(14,y,W-28,9,'S');
  doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(16,21,30); doc.text('TOTALE BUONI PASTO TURNO '+S.turno,18,y+6);
  doc.setFontSize(13); doc.setTextColor(200,16,46); doc.text(String(grand),W-20,y+6.5,{align:'right'}); y+=14;
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(91,99,110);
  doc.text('Personale: vuoto = presente (1)   SD = sost. diurna (2)   SN = sost. notturna (1)   R = recupero (0)   sigle assenza (0).    Esterni (EXT): ST = straordinario (1)   SO = sostituzione (0).',16,y);
  pdfSign(doc,'Siracusa, '+MESI[S.month-1]+' '+S.year,W,y+11,signer);
  doc.save('buoni_pasto_'+S.turno+'_'+S.year+'-'+String(S.month).padStart(2,'0')+'.pdf');
}

attach=function(){ _attach(); const r=db.ref(refMese()+'/mezziOp'); r.on('value',s=>{S.mezziOp=s.val()||{}; if(S.tab===1) render();}); scopeRefs.push(r); };

window.addEventListener('load',startApp);
